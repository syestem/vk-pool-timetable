<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Расписание бассейна</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="schedule.css" />
</head>
<body>

<div class="card">
  <h2 id="title"></h2>

  <div class="controls">
    <button data-pool="big" class="primary">Большой бассейн</button>
    <button data-pool="small">Малый бассейн</button>

    <button id="onlyFreeBtn">Только свободные</button>
    <button id="showAllBtn">Показать всё</button>

    <select id="laneFilter">
      <option value="1">Любая свободная</option>
      <option value="2">От 2 дорожек подряд</option>
      <option value="3">От 3 дорожек подряд</option>
      <option value="4">От 4 дорожек подряд</option>
      <option value="5">От 5 дорожек подряд</option>
      <option value="6">Все 6 дорожек</option>
    </select>
  </div>

  <div id="dayTabs" class="tabs"></div>

  <div id="scheduleContent" class="grid"></div>
</div>

<script src="schedule.js"></script>
</body>
</html>
