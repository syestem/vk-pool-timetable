<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание бассейна</title>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <link rel="stylesheet" href="schedule.css" />
</head>
<body>

<div class="card">
  <h2 id="title"></h2>

  <div class="controls">
    <div class="group">
      <button data-pool="big" class="primary">Большой бассейн</button>
      <button data-pool="small">Малый бассейн</button>
    </div>

    <div class="group">
      <button data-filter="0" class="primary">Все</button>
      <button data-filter="1">Только свободные</button>
      <button data-filter="2">От 2 дорожек</button>
      <button data-filter="3">От 3 дорожек</button>
    </div>
  </div>

  <div id="dayTabs" class="tabs"></div>

  <div id="scheduleContent" class="grid"></div>
</div>

<script src="schedule.js"></script>
</body>
</html>
